<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragon Kirin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  :root { --gold:#FFD700; --teal:#00FFD1; --deep:#020B18; --red:#FF3B3B; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--deep); font-family:'Rajdhani',sans-serif; overflow:hidden; height:100vh; width:100vw; display:flex; flex-direction:column; touch-action:none; user-select:none; }

  #hud { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; background:linear-gradient(180deg,rgba(0,0,0,0.94)0%,rgba(2,11,24,0.75)100%); border-bottom:2px solid rgba(255,215,0,0.4); flex-shrink:0; box-shadow:0 4px 20px rgba(0,0,0,0.6); }
  .hud-left { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
  .hud-label { font-size:10px; letter-spacing:3px; color:rgba(255,215,0,0.7); text-transform:uppercase; }
  .hud-value { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--gold); text-shadow:0 0 14px rgba(255,215,0,0.6); }
  .hud-value.credits { color:var(--teal); text-shadow:0 0 14px rgba(0,255,209,0.6); }
  .hud-monetary { font-family:'Orbitron',monospace; font-size:13px; color:#00FFD1; font-weight:700; }
  #title-badge { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; background:linear-gradient(135deg,#FFD700,#FF8C00,#FFD700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 8px rgba(255,165,0,0.8)); }
  .multiplier-badge { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; padding:4px 12px; border-radius:20px; background:rgba(255,215,0,0.15); border:1px solid var(--gold); color:var(--gold); text-shadow:0 0 8px rgba(255,215,0,0.7); white-space:nowrap; }

  #game-wrap { position:relative; flex:1; overflow:hidden; cursor:none; }
  canvas { position:absolute; inset:0; width:100%; height:100%; }

  #controls { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; background:linear-gradient(0deg,rgba(0,0,0,0.96)0%,rgba(2,11,24,0.85)100%); border-top:2px solid rgba(255,215,0,0.4); flex-shrink:0; gap:12px; box-shadow:0 -4px 20px rgba(0,0,0,0.6); }
  .bet-group { display:flex; align-items:center; gap:6px; }
  .bet-label { font-size:10px; letter-spacing:2px; color:rgba(255,215,0,0.7); text-transform:uppercase; }
  .bet-btn { background:rgba(255,215,0,0.12); border:2px solid rgba(255,215,0,0.5); color:var(--gold); font-family:'Orbitron',monospace; font-size:11px; padding:6px 12px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
  .bet-btn.active { background:rgba(255,215,0,0.35); border-color:var(--gold); box-shadow:0 0 12px rgba(255,215,0,0.6); }
  #fire-btn { background:linear-gradient(135deg,#FF6B00,#FF3B00); border:3px solid #FF8C00; color:#fff; font-family:'Orbitron',monospace; font-size:14px; font-weight:700; padding:10px 24px; border-radius:8px; cursor:pointer; letter-spacing:2px; box-shadow:0 0 20px rgba(255,80,0,0.7); transition:all 0.15s; }
  #buy-btn { background:linear-gradient(135deg,#00C897,#008F6A); border:3px solid var(--teal); color:#fff; font-family:'Orbitron',monospace; font-size:12px; font-weight:700; padding:9px 16px; border-radius:8px; cursor:pointer; box-shadow:0 0 16px rgba(0,255,209,0.5); }

  .hit-popup { position:absolute; font-family:'Orbitron',monospace; font-weight:900; pointer-events:none; animation:popUp 1.1s ease-out forwards; z-index:30; text-shadow:0 3px 10px rgba(0,0,0,0.9); }
  @keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 55%{opacity:1;transform:translateY(-42px) scale(1.35)} 100%{opacity:0;transform:translateY(-82px) scale(0.6)} }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(6px); }
  .modal-overlay.hidden { display:none; }
  .modal-box { background:linear-gradient(160deg,#041428,#020B18); border:2px solid rgba(255,215,0,0.5); border-radius:14px; padding:28px 24px; width:92%; max-width:360px; text-align:center; box-shadow:0 0 60px rgba(255,165,0,0.3); }
  .modal-title { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--gold); margin-bottom:8px; letter-spacing:2px; }
  .modal-sub { color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:22px; line-height:1.5; }
  .pkg-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .pkg-card { background:rgba(255,215,0,0.08); border:2px solid rgba(255,215,0,0.35); border-radius:10px; padding:14px 10px; cursor:pointer; transition:all 0.2s; }
  .pkg-card:hover,.pkg-card:active { background:rgba(255,215,0,0.22); border-color:var(--gold); transform:scale(1.04); }
  .pkg-card.popular { border-color:var(--teal); box-shadow:0 0 14px rgba(0,255,209,0.4); }
  .pkg-credits { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--teal); }
  .pkg-stars { font-size:14px; color:#FFD700; margin-top:4px; }
  .pkg-badge { font-size:9px; color:var(--teal); letter-spacing:2px; text-transform:uppercase; }
  .modal-close { background:transparent; border:2px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.6); font-family:'Rajdhani',sans-serif; font-size:13px; padding:9px 24px; border-radius:8px; cursor:pointer; }

  #alpaca-strip { display:flex; justify-content:center; align-items:center; gap:20px; padding:4px 16px; background:rgba(0,20,40,0.95); border-bottom:1px solid rgba(0,255,209,0.18); flex-shrink:0; }
  .alp-item { display:flex; align-items:center; gap:6px; }
  .alp-label { font-size:9px; letter-spacing:2px; color:rgba(0,255,209,0.55); text-transform:uppercase; font-family:'Orbitron',monospace; }
  .alp-val { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:#00FFD1; }
  .alp-val.pos { color:#00FF88; }
  .alp-val.neg { color:#FF3B3B; }
  .alp-dot { width:7px; height:7px; border-radius:50%; background:#555; flex-shrink:0; }
  .alp-dot.live { background:#00FF88; box-shadow:0 0 6px #00FF88; animation:pulse 1.8s infinite; }
  .alp-dot.err  { background:#FF3B3B; box-shadow:0 0 6px #FF3B3B; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .alp-trade-flash { animation:tradeFlash 0.7s ease-out; }
  @keyframes tradeFlash { 0%{color:#fff;text-shadow:0 0 12px #00FFD1} 100%{} }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-left">
    <div class="hud-label">CREDITS</div>
    <div class="hud-value credits" id="hud-credits">500</div>
    <div class="hud-monetary" id="hud-monetary">$50.00</div>
  </div>
  <div id="title-badge">🐉 DRAGON KIRIN</div>
  <div class="multiplier-badge" id="multiplier-badge">1.0x • $0.10</div>
</div>

<div id="alpaca-strip">
  <div class="alp-item"><div class="alp-dot" id="alp-dot"></div><span class="alp-label">ALPACA</span><span class="alp-val" id="alp-status">CONNECTING…</span></div>
  <div class="alp-item"><span class="alp-label">EQUITY</span><span class="alp-val" id="alp-equity">—</span></div>
  <div class="alp-item"><span class="alp-label">P&amp;L</span><span class="alp-val" id="alp-pnl">—</span></div>
  <div class="alp-item"><span class="alp-label">LAST TRADE</span><span class="alp-val" id="alp-last-trade">—</span></div>
</div>

<div id="game-wrap">
  <canvas id="sea"></canvas>
</div>

<div id="controls">
  <div class="bet-group">
    <span class="bet-label">BET</span>
    <button class="bet-btn active" data-val="1">×1</button>
    <button class="bet-btn" data-val="3">×3</button>
    <button class="bet-btn" data-val="5">×5</button>
    <button class="bet-btn" data-val="10">×10</button>
  </div>
  <button id="fire-btn">🔥 FIRE</button>
  <button id="buy-btn">⭐ BUY</button>
</div>

<div class="modal-overlay hidden" id="buy-modal">
  <div class="modal-box">
    <div class="modal-title">⭐ BUY CREDITS</div>
    <div class="modal-sub">Pay with Telegram Stars — instant & secure</div>
    <div class="pkg-grid">
      <div class="pkg-card" data-credits="200" data-stars="50"><div class="pkg-credits">200</div><div class="pkg-stars">⭐ 50</div></div>
      <div class="pkg-card popular" data-credits="600" data-stars="130"><div class="pkg-badge">★ POPULAR</div><div class="pkg-credits">600</div><div class="pkg-stars">⭐ 130</div></div>
      <div class="pkg-card" data-credits="1500" data-stars="300"><div class="pkg-credits">1500</div><div class="pkg-stars">⭐ 300</div></div>
      <div class="pkg-card" data-credits="4000" data-stars="700"><div class="pkg-badge">🔥 BEST VALUE</div><div class="pkg-credits">4000</div><div class="pkg-stars">⭐ 700</div></div>
    </div>
    <button class="modal-close" id="modal-close">CANCEL</button>
  </div>
</div>

<script>
// TELEGRAM INIT
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#020B18'); tg.setBackgroundColor('#020B18'); }
const tgUser = tg?.initDataUnsafe?.user;

// ─── ALPACA PAPER TRADING INTEGRATION ────────────────────────────────────────
const ALPACA_KEY    = 'PKAGLNSQU5ZIEN7ERVQKAY2BEI';
const ALPACA_SECRET = '6zFZn5q6G4AmMA4KS9ZT23fbMPp9vGAtdSwKob2Ve8Vq';
const ALPACA_BASE   = 'https://paper-api.alpaca.markets/v2';
const ALPACA_HDRS   = {
  'APCA-API-KEY-ID':     ALPACA_KEY,
  'APCA-API-SECRET-KEY': ALPACA_SECRET,
  'Content-Type':        'application/json'
};

// Fish → stock ticker mapping
const FISH_STOCKS = {
  'Clownfish': 'AAPL',
  'Blowfish':  'TSLA',
  'Crab':      'AMZN',
  'Lobster':   'GOOGL',
  'Turtle':    'NVDA',
  'Octopus':   'META',
  'Shark':     'SPY',
  'Dolphin':   'QQQ',
  'Whale':     'MSFT',
  'Dragon':    'ARKK',
  'Collector': 'COIN',
  'Dragon Boss': 'SPY'
};

let alpacaConnected = false;
let alpacaEquityVal = 0;
let alpacaStartEquity = 0;

function updateAlpacaHUD(equity, pnl){
  const dot    = document.getElementById('alp-dot');
  const status = document.getElementById('alp-status');
  const eqEl   = document.getElementById('alp-equity');
  const pnlEl  = document.getElementById('alp-pnl');
  if(equity !== undefined){
    dot.className    = 'alp-dot live';
    status.textContent = 'LIVE';
    eqEl.textContent   = '$' + equity.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(pnl !== undefined){
      const sign = pnl >= 0 ? '+' : '';
      pnlEl.textContent = sign + '$' + pnl.toFixed(2);
      pnlEl.className   = 'alp-val ' + (pnl >= 0 ? 'pos' : 'neg');
    }
  } else {
    dot.className    = 'alp-dot err';
    status.textContent = 'OFFLINE';
  }
}

async function fetchAlpacaAccount(){
  try {
    const res = await fetch(`${ALPACA_BASE}/account`, { headers: ALPACA_HDRS });
    if(!res.ok) throw new Error(res.status);
    const acct       = await res.json();
    const equity     = parseFloat(acct.equity);
    alpacaEquityVal  = equity;
    alpacaConnected  = true;
    if(alpacaStartEquity === 0) alpacaStartEquity = parseFloat(acct.last_equity) || equity;
    const pnl = equity - alpacaStartEquity;
    updateAlpacaHUD(equity, pnl);
  } catch(e){
    alpacaConnected = false;
    updateAlpacaHUD();
    console.warn('[Alpaca] account fetch failed:', e.message);
  }
}

async function placePaperOrder(symbol, qty, side){
  if(!alpacaConnected) return;
  try {
    const res = await fetch(`${ALPACA_BASE}/orders`, {
      method:  'POST',
      headers: ALPACA_HDRS,
      body: JSON.stringify({ symbol, qty: String(qty), side, type:'market', time_in_force:'day' })
    });
    if(!res.ok){ console.warn('[Alpaca] order rejected:', res.status); return; }
    const order = await res.json();
    const el = document.getElementById('alp-last-trade');
    el.textContent = `${side.toUpperCase()} ${qty} ${symbol}`;
    el.classList.remove('alp-trade-flash');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('alp-trade-flash');
    // Refresh balance after a short delay to let the paper order settle
    setTimeout(fetchAlpacaAccount, 2500);
    return order;
  } catch(e){
    console.warn('[Alpaca] order error:', e.message);
  }
}

// Initial fetch + periodic refresh every 30 s
fetchAlpacaAccount();
setInterval(fetchAlpacaAccount, 30000);
// ─────────────────────────────────────────────────────────────────────────────

// SESSION PROFIT-CAP (unchanged but now integrates with new round timer)
let sessionDeposit = 0, sessionCeiling = 0, sessionBaseCredits = 0, sessionPhase = 'NORMAL';
function startSession(depositAmount){
  sessionDeposit = depositAmount; sessionBaseCredits = credits;
  const mult = 1.0 + Math.random() * 0.60;
  sessionCeiling = sessionBaseCredits + Math.floor(depositAmount * mult);
  sessionPhase = 'NORMAL';
}
function updateSessionPhase(){
  if(sessionDeposit === 0) return;
  if(sessionPhase === 'NORMAL' && credits >= sessionCeiling) sessionPhase = 'TIGHTEN';
  if(sessionPhase === 'TIGHTEN' && credits >= sessionCeiling*1.1) sessionPhase = 'DRAIN';
  if(credits <= sessionBaseCredits * 0.15 && sessionPhase !== 'NORMAL'){
    sessionPhase = 'NORMAL'; sessionDeposit = 0;
  }
}
function hpMultiplier(){ return sessionPhase==='TIGHTEN' ? 3.0 : sessionPhase==='DRAIN' ? 6.0 : 1.0; }
function payoutRate(){ return sessionPhase==='TIGHTEN' ? 0.40 : sessionPhase==='DRAIN' ? 0.25 : 0.80; }

// NEW: POINTS SYSTEM – 1 credit = $0.10 base, multiplier up to 10x ($1.00/credit)
let baseCreditValue = 0.10;
let currentMultiplier = 1.0;

// FISH TYPES – higher HP, random value ranges, new Collector & Boss support
const FISH_TYPES = [
  { name:'Clownfish', emoji:'🐠', size:28, speed:1.5, minValue:3, maxValue:8, color:'#FF7F00', baseHp:15 },
  { name:'Blowfish',  emoji:'🐡', size:34, speed:0.95, minValue:6, maxValue:12, color:'#FFD700', baseHp:22 },
  { name:'Crab',      emoji:'🦀', size:32, speed:0.85, minValue:8, maxValue:15, color:'#E53935', baseHp:28 },
  { name:'Lobster',   emoji:'🦞', size:36, speed:0.75, minValue:10, maxValue:20, color:'#D32F2F', baseHp:32 },
  { name:'Turtle',    emoji:'🐢', size:40, speed:0.55, minValue:14, maxValue:28, color:'#4CAF50', baseHp:38 },
  { name:'Octopus',   emoji:'🐙', size:44, speed:0.65, minValue:18, maxValue:35, color:'#9C27B0', baseHp:45 },
  { name:'Shark',     emoji:'🦈', size:52, speed:1.95, minValue:25, maxValue:55, color:'#607D8B', baseHp:65 },
  { name:'Dolphin',   emoji:'🐬', size:46, speed:2.2, minValue:30, maxValue:60, color:'#0288D1', baseHp:55 },
  { name:'Whale',     emoji:'🐳', size:78, speed:0.45, minValue:60, maxValue:110, color:'#1565C0', baseHp:120 },
  { name:'Dragon',    emoji:'🐲', size:72, speed:1.05, minValue:90, maxValue:160, color:'#FF3D00', baseHp:160 },
  { name:'Collector', emoji:'🔮', size:46, speed:1.3, minValue:22, maxValue:45, color:'#00FFFF', baseHp:55, isSpecial:true }
];

let credits = 500, betMultiplier = 1;
let fishes = [], bullets = [], particles = [], explosions = [], bubbles = [];
let aimX = null, aimY = null, cannonAngle = -Math.PI/2;
let boss = null;
let shake = 0; // screen shake intensity
let roundTimer = 0; // unseen round timer

// CANVAS SETUP
const canvas = document.getElementById('sea');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('game-wrap');
function resize(){ canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; }
resize();
window.addEventListener('resize', resize);

// SPAWN NORMAL FISH
function spawnFish(){
  const type = FISH_TYPES[Math.floor(Math.random()*FISH_TYPES.length)];
  const fromLeft = Math.random() < 0.5;
  const hpBase = Math.ceil(type.baseHp * hpMultiplier() * (0.85 + Math.random()*0.7));
  const value = Math.floor(type.minValue + Math.random() * (type.maxValue - type.minValue + 1));
  fishes.push({
    ...type, hp: hpBase, maxHp: hpBase, value: value,
    x: fromLeft ? -type.size : canvas.width + type.size,
    y: 40 + Math.random()*(canvas.height - 130),
    dx: fromLeft ? type.speed : -type.speed,
    dy: (Math.random()-0.5)*0.8,
    wobble: Math.random()*Math.PI*2,
    rotation: 0
  });
}
setInterval(spawnFish, 720);
for(let i=0; i<10; i++) spawnFish();

// BOSS SPAWN
function spawnBoss(){
  if(boss) return;
  const hpBase = Math.ceil(480 * hpMultiplier() * (0.9 + Math.random()*0.4));
  boss = {
    name:'Dragon Boss', emoji:'🐉', size:92, speed:0.75,
    minValue:180, maxValue:420, color:'#FF2200',
    hp: hpBase, maxHp: hpBase, value: Math.floor(180 + Math.random()*240),
    x: canvas.width + 120, y: canvas.height/2 + (Math.random()*120 - 60),
    dx: -0.75, dy: (Math.random()-0.5)*0.3, wobble:0, isBoss:true
  };
}

// SPECIAL COLLECTOR LOGIC (called when killed)
function triggerCollectorBonus(killedFish){
  let bonus = 0;
  const targetName = killedFish.name;
  for(let i = fishes.length-1; i>=0; i--){
    const f = fishes[i];
    if(f.name === targetName && f !== killedFish){
      bonus += Math.floor(f.value * betMultiplier * payoutRate() * currentMultiplier);
      // visual death
      explosions.push({x:f.x, y:f.y, r:0, life:1.2, color:f.color});
      fishes.splice(i,1);
    }
  }
  return bonus;
}

// RICHOCHET PREVIEW
const MAX_BOUNCES = 3;
function ricochetPath(sx, sy, angle){
  const pts = [{x:sx, y:sy}];
  let x=sx, y=sy, dx=Math.cos(angle), dy=Math.sin(angle);
  const step = 7; let bounces = 0, dist = 0;
  while(dist < canvas.width*3.5 && bounces <= MAX_BOUNCES){
    x += dx*step; y += dy*step; dist += step;
    let hit = false;
    if(x<=3){ x=3; dx=Math.abs(dx); hit=true; }
    else if(x>=canvas.width-3){ x=canvas.width-3; dx=-Math.abs(dx); hit=true; }
    if(y<=3){ y=3; dy=Math.abs(dy); hit=true; }
    else if(y>=canvas.height-3){ y=canvas.height-3; dy=-Math.abs(dy); hit=true; }
    if(hit){ pts.push({x,y}); bounces++; }
  }
  pts.push({x,y});
  return pts;
}

// INPUT
wrap.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  aimX = e.clientX - r.left; aimY = e.clientY - r.top;
  cannonAngle = Math.atan2(aimY - canvas.height + 20, aimX - canvas.width/2);
});
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  aimX = e.touches[0].clientX - r.left; aimY = e.touches[0].clientY - r.top;
  cannonAngle = Math.atan2(aimY - canvas.height + 20, aimX - canvas.width/2);
}, {passive:false});
wrap.addEventListener('click', shoot);
wrap.addEventListener('touchend', e => { e.preventDefault(); shoot(); }, {passive:false});
document.getElementById('fire-btn').addEventListener('click', e => { e.stopPropagation(); shoot(); });

// SHOOT
const SPEED = 11.5;
function shoot(){
  if(credits < betMultiplier){ document.getElementById('buy-modal').classList.remove('hidden'); return; }
  credits -= betMultiplier;
  updateHUD();
  const cx = canvas.width/2, cy = canvas.height - 34;
  bullets.push({
    x:cx, y:cy,
    dx:Math.cos(cannonAngle)*SPEED,
    dy:Math.sin(cannonAngle)*SPEED,
    power:betMultiplier, size:6 + betMultiplier*0.8,
    bounces:0, trail:[]
  });
  // muzzle flash
  for(let i=0; i<14; i++){
    const a = cannonAngle + (Math.random()-0.5)*0.95;
    particles.push({x:cx, y:cy, dx:Math.cos(a)*7, dy:Math.sin(a)*7, life:0.9, color:Math.random()<0.5?'#FF8C00':'#FFF', size:5});
  }
  shake = 3; // light kick
}

// UPDATE BULLETS
function updateBullets(){
  for(let i=bullets.length-1; i>=0; i--){
    const b = bullets[i];
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 14) b.trail.shift();
    b.x += b.dx; b.y += b.dy;
    let hit = false;
    if(b.x <= b.size){ b.x = b.size; b.dx = Math.abs(b.dx); hit=true; }
    else if(b.x >= canvas.width - b.size){ b.x = canvas.width - b.size; b.dx = -Math.abs(b.dx); hit=true; }
    if(b.y <= b.size){ b.y = b.size; b.dy = Math.abs(b.dy); hit=true; }
    else if(b.y >= canvas.height - b.size){ b.y = canvas.height - b.size; b.dy = -Math.abs(b.dy); hit=true; }
    if(hit){
      b.bounces++;
      for(let j=0; j<6; j++){
        const a = Math.random()*Math.PI*2;
        particles.push({x:b.x, y:b.y, dx:Math.cos(a)*3, dy:Math.sin(a)*3, life:0.75, color:'#00FFD1', size:3});
      }
      if(b.bounces > MAX_BOUNCES) bullets.splice(i,1);
    }
  }
}

// HIT CHECK
function checkHits(){
  for(let bi=bullets.length-1; bi>=0; bi--){
    const b = bullets[bi];
    // normal fish
    for(let fi=fishes.length-1; fi>=0; fi--){
      const f = fishes[fi];
      const dx = b.x - f.x, dy = b.y - f.y;
      if(Math.hypot(dx, dy) < f.size * 0.58){
        f.hp -= b.power;
        bullets.splice(bi,1);
        for(let k=0; k<8; k++){
          const a = Math.random()*Math.PI*2;
          particles.push({x:f.x, y:f.y, dx:Math.cos(a)*3.5, dy:Math.sin(a)*3.5, life:1.1, color:f.color, size:4});
        }
        if(f.hp <= 0){
          let earn = Math.floor(f.value * betMultiplier * payoutRate() * currentMultiplier);
          if(f.isSpecial){
            const bonus = triggerCollectorBonus(f);
            earn += bonus;
            showPopup(f.x, f.y, `BONUS +${bonus}`, '#00FFFF', '22px');
          }
          credits += earn;
          score = 0; // removed but kept var for safety
          updateHUD();
          showPopup(f.x, f.y, `+${earn}`, f.value >= 60 ? '#FF3B3B' : '#FFD700', f.value >= 60 ? '24px' : '16px');
          explosions.push({x:f.x, y:f.y, r:0, life:1.4, color:f.color});
          // ALPACA: place a paper buy order mapped to this fish's stock
          const fishSymbol = FISH_STOCKS[f.name] || 'SPY';
          const fishQty = Math.max(1, Math.floor(f.value / 20));
          placePaperOrder(fishSymbol, fishQty, 'buy');
          fishes.splice(fi,1);
          if(Math.random() < 0.35) shake = 6; // big hit shake
        }
        break;
      }
    }
    // boss
    if(boss){
      const dx = b.x - boss.x, dy = b.y - boss.y;
      if(Math.hypot(dx, dy) < boss.size * 0.62){
        boss.hp -= b.power;
        bullets.splice(bi,1);
        for(let k=0; k<12; k++){
          const a = Math.random()*Math.PI*2;
          particles.push({x:boss.x, y:boss.y, dx:Math.cos(a)*5, dy:Math.sin(a)*5, life:1.3, color:'#FF2200', size:6});
        }
        if(boss.hp <= 0){
          let earn = Math.floor(boss.value * betMultiplier * payoutRate() * currentMultiplier * (1.8 + Math.random()*2.2));
          credits += earn;
          updateHUD();
          showPopup(boss.x, boss.y, `BOSS +${earn}`, '#FF3B3B', '32px');
          explosions.push({x:boss.x, y:boss.y, r:0, life:2.2, color:'#FF2200'});
          boss = null;
          shake = 12; // massive boss kill shake
          // ALPACA: boss kill → large SPY buy order
          placePaperOrder('SPY', 10, 'buy');
          // big multiplier boost on boss kill
          currentMultiplier = 10;
          setTimeout(()=>{ if(currentMultiplier===10) currentMultiplier=1 + Math.random()*4; updateHUD(); }, 18000);
        }
      }
    }
  }
}

function showPopup(x,y,text,color,size){
  const el = document.createElement('div');
  el.className = 'hit-popup';
  el.textContent = text;
  el.style.cssText = `left:${x}px;top:${y-30}px;color:${color};font-size:${size};`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function updateHUD(){
  document.getElementById('hud-credits').textContent = credits.toLocaleString();
  const monetary = (credits * baseCreditValue * currentMultiplier).toFixed(2);
  document.getElementById('hud-monetary').textContent = `$${monetary}`;
  const badge = document.getElementById('multiplier-badge');
  badge.textContent = `${currentMultiplier.toFixed(1)}x • $${(baseCreditValue * currentMultiplier).toFixed(2)}`;
  if(currentMultiplier >= 6) badge.style.background = 'rgba(255,59,59,0.3)'; else badge.style.background = 'rgba(255,215,0,0.15)';
}

// BACKGROUND BUBBLES
function createBubble(){
  bubbles.push({
    x: Math.random()*canvas.width,
    y: canvas.height + 20,
    size: 3 + Math.random()*7,
    speed: 0.6 + Math.random()*1.1
  });
}
for(let i=0; i<35; i++) createBubble();
setInterval(()=>{ if(bubbles.length < 45) createBubble(); }, 80);

// DRAW FUNCTIONS (greatly enhanced)
let waveT = 0;
function drawBackground(){
  const W = canvas.width, H = canvas.height;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#020d22'); g.addColorStop(0.45,'#031f3d'); g.addColorStop(1,'#010a18');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // light rays
  ctx.save();
  ctx.globalAlpha = 0.07;
  for(let i=0; i<6; i++){
    const x = W*0.1 + (W*0.8/5)*i;
    const ray = ctx.createLinearGradient(x,0,x+80,H);
    ray.addColorStop(0,'#00ddff'); ray.addColorStop(1,'transparent');
    ctx.fillStyle = ray;
    ctx.fillRect(x,0,80,H);
  }
  ctx.restore();

  // bubbles
  ctx.fillStyle = 'rgba(150,240,255,0.65)';
  for(let i=bubbles.length-1; i>=0; i--){
    const b = bubbles[i];
    b.y -= b.speed;
    ctx.globalAlpha = b.y / H;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    if(b.y < -20) bubbles.splice(i,1);
  }
  ctx.globalAlpha = 1;

  waveT += 0.022;
  // surface shimmer
  ctx.fillStyle = 'rgba(100,220,255,0.12)';
  for(let i=0; i<18; i++){
    const bx = (W/14 * i + Math.sin(waveT*1.3 + i)*22) % W;
    ctx.beginPath(); ctx.arc(bx, 30 + Math.sin(waveT*2 + i)*8, 2.5, 0, Math.PI*2); ctx.fill();
  }
}

function drawWallGlow(){
  ctx.save();
  ctx.shadowColor = '#00FFD1'; ctx.shadowBlur = 22;
  ctx.strokeStyle = 'rgba(0,255,209,0.22)';
  ctx.lineWidth = 5;
  ctx.strokeRect(3,3,canvas.width-6,canvas.height-6);
  ctx.restore();
}

function drawLaserAim(){
  if(!aimX) return;
  const cx = canvas.width/2, cy = canvas.height - 34;
  const pts = ricochetPath(cx, cy, cannonAngle);
  ctx.save();
  ctx.lineWidth = 1.8;
  for(let i=0; i<pts.length-1; i++){
    const fade = 1 - (i / pts.length);
    ctx.setLineDash([6,10]);
    ctx.strokeStyle = `rgba(255,60,60,${fade*0.8})`;
    ctx.shadowColor = '#FF3333'; ctx.shadowBlur = 9;
    ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[i+1].x, pts[i+1].y); ctx.stroke();
  }
  const tip = pts[pts.length-1];
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(255,80,80,0.95)';
  ctx.shadowBlur = 14;
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(tip.x, tip.y, 9, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tip.x-14, tip.y); ctx.lineTo(tip.x+14, tip.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tip.x, tip.y-14); ctx.lineTo(tip.x, tip.y+14); ctx.stroke();
  ctx.restore();
}

function drawCannon(){
  const cx = canvas.width/2, cy = canvas.height - 12;
  ctx.save(); ctx.translate(cx, cy);
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 24;
  const baseG = ctx.createRadialGradient(0,0,6,0,0,32);
  baseG.addColorStop(0,'#FFD700'); baseG.addColorStop(1,'rgba(184,134,11,0)');
  ctx.fillStyle = baseG; ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.fill();
  ctx.rotate(cannonAngle + Math.PI/2);
  ctx.shadowColor = '#FF6B00'; ctx.shadowBlur = 14;
  const barrelG = ctx.createLinearGradient(-8,0,8,0);
  barrelG.addColorStop(0,'#8B4513'); barrelG.addColorStop(0.5,'#FFD700'); barrelG.addColorStop(1,'#8B4513');
  ctx.fillStyle = barrelG; ctx.fillRect(-9,-44,18,44);
  ctx.fillStyle = '#FF9500'; ctx.fillRect(-10,-50,20,9);
  ctx.restore();
}

function drawFish(f){
  f.wobble += 0.045;
  f.rotation = Math.atan2(f.dy, f.dx) * 0.3;
  ctx.save();
  ctx.translate(f.x, f.y + Math.sin(f.wobble)*3);
  if(f.dx > 0) ctx.scale(-1,1);
  ctx.rotate(f.rotation);
  // HP bar
  const bw = f.size * 1.35, bh = 5;
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(-bw/2, -f.size/2 - 18, bw, bh);
  const pct = f.hp / f.maxHp;
  ctx.fillStyle = pct > 0.65 ? '#00FF88' : pct > 0.35 ? '#FFD700' : '#FF3B3B';
  ctx.fillRect(-bw/2, -f.size/2 - 18, bw * pct, bh);
  ctx.shadowColor = f.color; ctx.shadowBlur = 14;
  ctx.font = `${f.size}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(f.emoji, 0, 0);
  ctx.restore();
}

function drawBoss(){
  if(!boss) return;
  boss.wobble += 0.06;
  ctx.save();
  ctx.translate(boss.x, boss.y + Math.sin(boss.wobble)*6);
  ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 28;
  ctx.font = `${boss.size}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(boss.emoji, 0, 0);
  // boss HP bar
  const bw = boss.size * 1.6, bh = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(-bw/2, -boss.size/2 - 28, bw, bh);
  const pct = boss.hp / boss.maxHp;
  ctx.fillStyle = '#FF3B3B';
  ctx.fillRect(-bw/2, -boss.size/2 - 28, bw * pct, bh);
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  for(let t=0; t<b.trail.length; t++){
    ctx.globalAlpha = (t/b.trail.length) * 0.4;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(b.trail[t].x, b.trail[t].y, b.size*(t/b.trail.length)*0.75, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 22;
  const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size+4);
  g.addColorStop(0,'#FFF'); g.addColorStop(0.5,'#FFD700'); g.addColorStop(1,'transparent');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawExplosions(){
  for(let i=explosions.length-1; i>=0; i--){
    const e = explosions[i];
    e.r += 7.5; e.life -= 0.048;
    if(e.life <= 0){ explosions.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = e.life;
    ctx.shadowColor = e.color; ctx.shadowBlur = 26;
    const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
    g.addColorStop(0,'#FFF'); g.addColorStop(0.35, e.color); g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles(){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.dx; p.y += p.dy; p.dy += 0.14; p.life -= 0.055;
    if(p.life <= 0){ particles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// MAIN LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  updateSessionPhase();

  // unseen round timer
  if(Date.now() > roundTimer){
    const duration = (180 + Math.random()*420) * 1000; // 3-10 minutes
    roundTimer = Date.now() + duration;
    if(Math.random() < 0.75) spawnBoss();
    currentMultiplier = Math.max(currentMultiplier, 1 + Math.random()*4); // small round-start boost
    setTimeout(()=>{ if(currentMultiplier > 5) currentMultiplier = 1 + Math.random()*3; updateHUD(); }, 22000);
  }

  drawBackground();
  drawWallGlow();

  // update & draw fish
  for(let i=fishes.length-1; i>=0; i--){
    const f = fishes[i];
    f.x += f.dx; f.y += f.dy;
    if(f.y < 30) f.dy = Math.abs(f.dy);
    if(f.y > canvas.height-65) f.dy = -Math.abs(f.dy);
    if(f.x < -150 || f.x > canvas.width+150) fishes.splice(i,1);
    else drawFish(f);
  }

  updateBullets();
  bullets.forEach(drawBullet);
  checkHits();

  drawExplosions();
  drawParticles();
  drawBoss();
  drawLaserAim();
  drawCannon();

  // screen shake
  if(shake > 0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake *= 0.88;
    ctx.restore();
  }

  requestAnimationFrame(loop);
}
loop();

// BET BUTTONS
document.querySelectorAll('.bet-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    betMultiplier = parseInt(btn.dataset.val);
  });
});

// BUY MODAL
document.getElementById('buy-btn').addEventListener('click', () => document.getElementById('buy-modal').classList.remove('hidden'));
document.getElementById('modal-close').addEventListener('click', () => document.getElementById('buy-modal').classList.add('hidden'));

document.querySelectorAll('.pkg-card').forEach(card => {
  card.addEventListener('click', () => {
    const amount = parseInt(card.dataset.credits);
    const stars = parseInt(card.dataset.stars);
    if(tg && tg.openInvoice){
      tg.openInvoice(`https://YOUR_BOT_BACKEND/invoice?credits=${amount}&stars=${stars}&user_id=${tgUser?.id}`, status => {
        if(status === 'paid'){
          credits += amount;
          startSession(amount);
          updateHUD();
          document.getElementById('buy-modal').classList.add('hidden');
          showPopup(canvas.width/2, canvas.height/3, `+${amount} CREDITS!`, '#00FFD1', '28px');
        }
      });
    } else {
      // demo mode
      credits += amount;
      startSession(amount);
      updateHUD();
      document.getElementById('buy-modal').classList.add('hidden');
      showPopup(canvas.width/2, canvas.height/3, `+${amount} CREDITS!`, '#00FFD1', '28px');
    }
  });
});

// Start first round timer
roundTimer = Date.now() + (180 + Math.random()*420)*1000;

// Dynamic multiplier fluctuation (25-50 seconds)
setInterval(() => {
  currentMultiplier = 1 + Math.random() * 9;
  updateHUD();
}, 25000 + Math.random()*25000);

updateHUD();
</script>
