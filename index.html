<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#001a33">
<title>Ocean Kirin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #001a33; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; touch-action: none; overscroll-behavior: none; }
  #game { display: block; position: fixed; top: 0; left: 0; }
  .hud { position: fixed; left: 0; right: 0; pointer-events: none; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.6); z-index: 10; }
  .top-hud { top: env(safe-area-inset-top, 12px); padding: 12px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
  .coin-display { background: linear-gradient(180deg, rgba(15,30,60,.85), rgba(5,15,35,.85)); border: 1px solid rgba(255,215,0,.4); border-radius: 14px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); box-shadow: 0 4px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1); }
  .coin-icon { width: 22px; height: 22px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #FFE066, #D4A017); box-shadow: 0 0 8px rgba(255,215,0,.6), inset -2px -2px 4px rgba(0,0,0,.3); flex-shrink: 0; }
  .coin-value { font-size: 18px; font-weight: 700; letter-spacing: .5px; color: #FFD700; }
  .bottom-hud { bottom: env(safe-area-inset-bottom, 12px); padding: 0 12px 12px; pointer-events: auto; display: flex; justify-content: center; align-items: center; gap: 12px; }
  .bet-control { display: flex; align-items: center; gap: 0; background: linear-gradient(180deg, rgba(15,30,60,.9), rgba(5,15,35,.9)); border: 1px solid rgba(255,255,255,.15); border-radius: 999px; backdrop-filter: blur(10px); box-shadow: 0 6px 20px rgba(0,0,0,.4); overflow: hidden; }
  .bet-btn { width: 40px; height: 40px; background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; transition: background .15s; }
  .bet-btn:active { background: rgba(255,255,255,.1); }
  .bet-display { min-width: 70px; text-align: center; padding: 0 6px; border-left: 1px solid rgba(255,255,255,.1); border-right: 1px solid rgba(255,255,255,.1); }
  .bet-label { font-size: 9px; opacity: .6; letter-spacing: 1.5px; text-transform: uppercase; }
  .bet-value { font-size: 16px; font-weight: 700; color: #FFD700; line-height: 1.1; }
  .power-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; background: linear-gradient(180deg, #4a3000, #2a1c00); border: 2px solid #FFD700; color: #FFD700; font-size: 22px; box-shadow: 0 4px 14px rgba(255,215,0,.3), inset 0 1px 0 rgba(255,255,255,.2); position: relative; transition: transform .1s; }
  .power-btn:active { transform: scale(.92); }
  .power-btn[disabled] { opacity: .35; border-color: #555; color: #888; box-shadow: none; }
  .power-count { position: absolute; top: -4px; right: -4px; background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #001a33; }
  .toast { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; text-align: center; }
  .toast-title { font-size: 42px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(180deg, #fff700, #ff8800); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255,200,0,.8); animation: toast-pop .8s ease-out forwards; }
  @keyframes toast-pop { 0% { transform: scale(.4); opacity: 0; } 20% { transform: scale(1.15); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.05); opacity: 0; } }
  .start-screen { position: fixed; inset: 0; z-index: 200; background: radial-gradient(ellipse at center, #002b5c 0%, #000814 80%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; padding: 20px; }
  .logo { font-size: 56px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(180deg, #FFE066 0%, #FFA500 50%, #FF4500 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(255,140,0,.5); margin-bottom: 8px; animation: logo-glow 2.5s ease-in-out infinite; }
  .tagline { font-size: 13px; letter-spacing: 4px; opacity: .7; margin-bottom: 40px; text-transform: uppercase; }
  @keyframes logo-glow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
  .play-btn { background: linear-gradient(180deg, #FFD700, #B8860B); color: #000; font-size: 18px; font-weight: 800; letter-spacing: 2px; padding: 16px 48px; border-radius: 999px; border: none; cursor: pointer; box-shadow: 0 8px 24px rgba(255,215,0,.4), inset 0 1px 0 rgba(255,255,255,.4); text-transform: uppercase; transition: transform .1s; }
  .play-btn:active { transform: scale(.95); }
  .info-row { display: flex; gap: 24px; margin-top: 30px; opacity: .6; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="hud top-hud">
  <div class="coin-display">
    <div class="coin-icon"></div>
    <div class="coin-value" id="coins">1,000</div>
  </div>
</div>

<div class="hud bottom-hud">
  <div class="bet-control">
    <button class="bet-btn" id="betDown">−</button>
    <div class="bet-display">
      <div class="bet-label">Cannon</div>
      <div class="bet-value" id="betValue">×1</div>
    </div>
    <button class="bet-btn" id="betUp">+</button>
  </div>
  <button class="power-btn" id="lightning" disabled>⚡<span class="power-count" id="lightningCount">0</span></button>
</div>

<div class="start-screen" id="start">
  <div class="logo">OCEAN KIRIN</div>
  <div class="tagline">Hunt the Deep</div>
  <button class="play-btn" id="playBtn">Play</button>
  <div class="info-row">
    <span>Tap to shoot</span>
    <span>±</span>
    <span>Bet to scale</span>
  </div>
</div>

<script>
'use strict';

const TG = window.Telegram?.WebApp;
if (TG) {
  TG.ready();
  TG.expand();
  try { TG.setHeaderColor('#001a33'); TG.setBackgroundColor('#001a33'); } catch(e) {}
}

const haptic = (kind) => {
  try {
    if (TG?.HapticFeedback) {
      if (kind === 'shoot') TG.HapticFeedback.impactOccurred('light');
      else if (kind === 'kill') TG.HapticFeedback.impactOccurred('medium');
      else if (kind === 'big') TG.HapticFeedback.notificationOccurred('success');
    }
  } catch(e) {}
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });
let W = 0, H = 0, dpr = 1;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// Background Image (replace URL with your shipwreck image if needed)
const bgImage = new Image();
bgImage.src = 'https://i.imgur.com/0zXzXzX.jpg'; // ← Change this to your image URL

const BET_LEVELS = [1, 5, 10, 25, 100];
const BET_NAMES = ['×1', '×5', '×10', '×25', '×100'];

const state = {
  coins: 1000,
  score: 0,
  best: parseInt(localStorage.getItem('oceanKirinBest') || '0'),
  betIdx: 0,
  lightning: 0,
  running: false,
  shake: 0,
  combo: 0,
  comboTimer: 0,
  multiplier: 1,
  multTimer: 0,
};

const FISH = [
  { id:'minnow', val:2, hp:1, size:22, speed:1.4, body:'#7FB3D5', accent:'#5499C7', tier:0 },
  { id:'goldfish', val:3, hp:2, size:26, speed:1.3, body:'#F39C12', accent:'#D35400', tier:0 },
  { id:'clown', val:5, hp:3, size:30, speed:1.2, body:'#E67E22', accent:'#FFFFFF', tier:1, stripes:true },
  { id:'angel', val:8, hp:5, size:34, speed:1.1, body:'#F4D03F', accent:'#B7950B', tier:1 },
  { id:'puffer', val:14, hp:8, size:38, speed:0.9, body:'#D4A574', accent:'#8B6914', tier:2, spiky:true },
  { id:'tuna', val:20, hp:12, size:48, speed:1.5, body:'#3498DB', accent:'#1F618D', tier:2 },
  { id:'lantern', val:35, hp:18, size:42, speed:1.0, body:'#8E44AD', accent:'#FFD700', tier:3, glow:true },
  { id:'shark', val:60, hp:30, size:64, speed:1.7, body:'#5D6D7E', accent:'#2C3E50', tier:3 },
  { id:'sword', val:90, hp:45, size:74, speed:2.0, body:'#BDC3C7', accent:'#34495E', tier:4, sword:true },
  { id:'manta', val:140, hp:65, size:84, speed:1.0, body:'#1B2631', accent:'#5D6D7E', tier:4, ray:true },
  { id:'dragon', val:400, hp:140, size:100, speed:0.8, body:'#FFD700', accent:'#B8860B', tier:5, boss:true, dragon:true },
  { id:'kirin', val:1000,hp:280, size:120, speed:0.7, body:'#E91E63', accent:'#7D1538', tier:6, boss:true, kirin:true }
];

const SPAWN_WEIGHTS = [22, 20, 16, 14, 10, 8, 5, 3, 1.5, 0.8, 0.15, 0.05];

const fish = [], bullets = [], particles = [], popups = [], coinEffects = [], bubbles = [];

for (let i = 0; i < 30; i++) {
  bubbles.push({ x: Math.random()*W, y: Math.random()*H, r: 2+Math.random()*6, vy: -0.3-Math.random()*0.6, vx: (Math.random()-0.5)*0.2, alpha: 0.1+Math.random()*0.3 });
}

function adjust(hex, amt) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + amt;
  let g = ((num >> 8) & 0xff) + amt;
  let b = (num & 0xff) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// Fish drawing - NO health bar
function drawFish(f, time) {
  const t = f.type;
  const wag = Math.sin(time * 0.008 + f.x * 0.02) * 0.18;
  const vScale = Math.sin(time * 0.005 + f.y * 0.01) * 2;
  ctx.save();
  ctx.translate(f.x, f.y + vScale);
  ctx.rotate(f.angle);
  ctx.scale(f.facing, 1);
  const s = f.size;
  if (f.flash > 0) ctx.filter = `brightness(${1 + f.flash * 2.2}) saturate(1.3)`;

  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, s*0.4, s*0.65, s*0.18, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = ctx.shadowOffsetY = 0;

  if (t.kirin) drawKirin(s,t,time,wag);
  else if (t.dragon) drawDragon(s,t,time,wag);
  else if (t.ray) drawManta(s,t,wag);
  else if (t.sword) drawSwordfish(s,t,wag);
  else if (t.glow) drawLantern(s,t,time);
  else if (t.spiky) drawPuffer(s,t,wag);
  else drawGeneric(s,t,wag,f);

  ctx.restore();
}

function drawGeneric(s, t, wag, f) {
  ctx.fillStyle = t.accent;
  ctx.shadowBlur = 8; ctx.shadowColor = t.accent;
  ctx.beginPath();
  ctx.moveTo(-s * 0.48, 0);
  ctx.quadraticCurveTo(-s * 0.92, -s * 0.42 + wag * s * 0.4, -s * 0.75, 0);
  ctx.quadraticCurveTo(-s * 0.92, s * 0.42 + wag * s * 0.4, -s * 0.48, 0);
  ctx.fill();
  ctx.shadowBlur = 0;

  const g = ctx.createRadialGradient(s * 0.12, -s * 0.22, s * 0.08, 0, 0, s * 0.68);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.15, adjust(t.body, 75));
  g.addColorStop(0.55, t.body);
  g.addColorStop(1, t.accent);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.52, s * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.ellipse(i * s * 0.14, -s*0.05, s*0.09, s*0.22, 0.2, 0, Math.PI*2);
    ctx.fill();
  }

  if (t.stripes) {
    ctx.fillStyle = '#fff';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.ellipse(i * s * 0.19, 0, s * 0.045, s * 0.31, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.fillStyle = t.accent;
  ctx.shadowBlur = 6;
  ctx.shadowColor = t.accent;
  ctx.beginPath();
  ctx.moveTo(-s * 0.2, -s * 0.3);
  ctx.quadraticCurveTo(0, -s * 0.62, s * 0.22, -s * 0.28);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-s * 0.12, s * 0.26);
  ctx.quadraticCurveTo(0, s * 0.52, s * 0.22, s * 0.24);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = adjust(t.body, -35);
  ctx.beginPath();
  ctx.ellipse(s * 0.08, s * 0.06, s * 0.22, s * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.29, -s * 0.09, s * 0.085, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(s * 0.305, -s * 0.085, s * 0.048, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.325, -s * 0.115, s * 0.02, 0, Math.PI * 2);
  ctx.fill();
}

function drawPuffer(s, t, wag) {
  ctx.fillStyle = t.accent;
  ctx.shadowBlur = 4;
  ctx.shadowColor = '#000';
  const spikes = 16;
  for (let i = 0; i < spikes; i++) {
    const a = (i / spikes) * Math.PI * 2 + wag * 0.3;
    const r1 = s * 0.44, r2 = s * 0.65;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a - 0.12) * r1, Math.sin(a - 0.12) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.lineTo(Math.cos(a + 0.12) * r1, Math.sin(a + 0.12) * r1);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  const g = ctx.createRadialGradient(-s * 0.15, -s * 0.18, s * 0.1, 0, 0, s * 0.55);
  g.addColorStop(0, '#fff');
  g.addColorStop(0.3, adjust(t.body, 55));
  g.addColorStop(1, t.body);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.46, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = adjust(t.body, 65);
  ctx.beginPath();
  ctx.ellipse(0, s * 0.12, s * 0.33, s * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  for (const off of [-s * 0.18, s * 0.18]) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(off, -s * 0.12, s * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(off + 0.03 * s, -s * 0.11, s * 0.055, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(off + 0.05 * s, -s * 0.14, s * 0.02, 0, Math.PI * 2); ctx.fill();
  }
}

function drawSwordfish(s, t, wag) {
  ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = s * 0.068; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(s * 0.48, -s * 0.03); ctx.lineTo(s * 1.05, 0); ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = '#444'; ctx.lineWidth = s * 0.035;
  ctx.beginPath(); ctx.moveTo(s * 0.48, -s * 0.03); ctx.lineTo(s * 1.05, 0); ctx.stroke();

  ctx.fillStyle = t.accent; ctx.shadowBlur = 8; ctx.shadowColor = t.accent;
  ctx.beginPath();
  ctx.moveTo(-s * 0.48, 0);
  ctx.quadraticCurveTo(-s * 1.05, -s * 0.48 + wag*0.6, -s * 0.78, 0);
  ctx.quadraticCurveTo(-s * 1.05, s * 0.48 + wag*0.6, -s * 0.48, 0);
  ctx.fill(); ctx.shadowBlur = 0;

  const g = ctx.createLinearGradient(-s*0.4, -s*0.35, s*0.4, s*0.35);
  g.addColorStop(0,'#fff'); g.addColorStop(0.4,adjust(t.body,40));
  g.addColorStop(0.7,t.body); g.addColorStop(1,t.accent);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0,0,s*0.52,s*0.26,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = t.accent; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(-s * 0.3, -s * 0.22); ctx.quadraticCurveTo(-s * 0.05, -s * 0.68, s * 0.28, -s * 0.2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(s * 0.29, -s * 0.06, s * 0.068, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(s * 0.305, -s * 0.055, s * 0.038, 0, Math.PI * 2); ctx.fill();
}

function drawManta(s, t, wag) {
  const flap = Math.sin(performance.now()*0.0035)*0.55;
  const wingG = ctx.createRadialGradient(0, -s*0.1, s*0.2, 0, 0, s*0.95);
  wingG.addColorStop(0,'#fff'); wingG.addColorStop(0.4,adjust(t.body,35)); wingG.addColorStop(1,t.body);
  ctx.fillStyle = wingG;
  ctx.beginPath();
  ctx.moveTo(0, -s*0.55);
  ctx.bezierCurveTo(-s*0.35, -s*0.6 + flap*s*0.3, -s*0.85, -s*0.35 + flap*s*0.5, -s*0.72, 0);
  ctx.bezierCurveTo(-s*0.65, s*0.15, -s*0.45, s*0.2, -s*0.18, 0.05);
  ctx.lineTo(s*0.18, 0.05);
  ctx.bezierCurveTo(s*0.45, s*0.2, s*0.65, s*0.15, s*0.72, 0);
  ctx.bezierCurveTo(s*0.85, -s*0.35 + flap*s*0.5, s*0.35, -s*0.6 + flap*s*0.3, 0, -s*0.55);
  ctx.fill();

  ctx.fillStyle = adjust(t.body, -30);
  ctx.beginPath(); ctx.ellipse(0, -s*0.08, s*0.14, s*0.38, 0, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = adjust(t.accent, -20); ctx.lineWidth = s*0.055; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, s*0.12); ctx.quadraticCurveTo(0, s*0.55, s*0.18, s*0.72); ctx.stroke();

  ctx.fillStyle = '#a5f3fc';
  ctx.beginPath(); ctx.arc(-s*0.09, -s*0.32, s*0.032,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.09, -s*0.32, s*0.032,0,Math.PI*2); ctx.fill();
}

function drawLantern(s, t, time) {
  const pulse = 0.65 + 0.35 * Math.sin(time * 0.007);
  const glow = ctx.createRadialGradient(s * 0.42, -s * 0.25, 0, s * 0.42, -s * 0.25, s * 0.85);
  glow.addColorStop(0, `rgba(255,245,180,${0.75 * pulse})`);
  glow.addColorStop(0.5, `rgba(255,220,100,${0.25 * pulse})`);
  glow.addColorStop(1, 'rgba(255,180,60,0)');
  ctx.fillStyle = glow; ctx.fillRect(-s*1.1, -s*1.1, s*2.2, s*2.2);

  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(0,0,s*0.48,s*0.34,0,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#555'; ctx.lineWidth = s*0.028;
  ctx.beginPath(); ctx.moveTo(s*0.12, -s*0.28); ctx.quadraticCurveTo(s*0.38, -s*0.58, s*0.45, -s*0.25); ctx.stroke();

  const bulbG = ctx.createRadialGradient(s*0.42, -s*0.22, 0, s*0.42, -s*0.22, s*0.14);
  bulbG.addColorStop(0,'#fff7c2'); bulbG.addColorStop(1,t.accent);
  ctx.fillStyle = bulbG;
  ctx.beginPath(); ctx.arc(s*0.42, -s*0.22, s*0.115,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(s*0.08, -s*0.09, s*0.055,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(s*0.09, -s*0.085, s*0.028,0,Math.PI*2); ctx.fill();
}

function drawDragon(s, t, time, wag) {
  for (let i = 0; i < 4; i++) {
    const aura = ctx.createRadialGradient(0,0,s*0.45,0,0,s*(1.05+i*0.2));
    aura.addColorStop(0,`rgba(255,215,80,${0.28-i*0.07})`);
    aura.addColorStop(1,'rgba(255,140,0,0)');
    ctx.fillStyle = aura; ctx.fillRect(-s*1.3,-s*1.3,s*2.6,s*2.6);
  }

  const segs = 7;
  for (let i = segs; i >= 0; i--) {
    const x = -s*0.12 - i*s*0.145;
    const wave = Math.sin(time*0.005 - i*0.55)*s*0.13 + wag*4;
    const sz = s*(0.34 - i*0.028);
    const g = ctx.createRadialGradient(x, wave, 0, x, wave, sz*1.1);
    g.addColorStop(0,'#fffbeb'); g.addColorStop(0.45,t.body); g.addColorStop(1,t.accent);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, wave, sz, sz*0.78, 0, 0, Math.PI*2); ctx.fill();
  }

  const hg = ctx.createRadialGradient(s*0.15, -s*0.08, 0, s*0.15, 0, s*0.48);
  hg.addColorStop(0,'#fef08c'); hg.addColorStop(0.6,t.body); hg.addColorStop(1,t.accent);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(s*0.15,0,s*0.44,s*0.34,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#fcd34d';
  ctx.beginPath(); ctx.moveTo(s*0.08,-s*0.32); ctx.lineTo(-s*0.02,-s*0.68); ctx.lineTo(s*0.05,-s*0.28); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*0.28,-s*0.3); ctx.lineTo(s*0.42,-s*0.65); ctx.lineTo(s*0.32,-s*0.25); ctx.fill();

  ctx.strokeStyle = '#fff'; ctx.lineWidth = s*0.028;
  ctx.beginPath();
  ctx.moveTo(s*0.42,s*0.04); ctx.quadraticCurveTo(s*0.68,s*0.12,s*0.58,s*0.38);
  ctx.moveTo(s*0.42,-s*0.08); ctx.quadraticCurveTo(s*0.68,-s*0.16,s*0.58,-s*0.38);
  ctx.stroke();

  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(s*0.29,-s*0.09,s*0.08,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#b91c1c'; ctx.beginPath(); ctx.arc(s*0.31,-s*0.085,s*0.05,0,Math.PI*2); ctx.fill();
}

function drawKirin(s, t, time, wag) {
  for (let i = 0; i < 4; i++) {
    const aura = ctx.createRadialGradient(0,0,s*0.4,0,0,s*(1.15+i*0.22));
    const hue = (time*0.045 + i*95) % 360;
    aura.addColorStop(0, `hsla(${hue},95%,72%,${0.32-i*0.09})`);
    aura.addColorStop(1,'transparent');
    ctx.fillStyle = aura; ctx.fillRect(-s*1.4,-s*1.4,s*2.8,s*2.8);
  }

  const segs = 8;
  for (let i = segs; i >= 0; i--) {
    const x = -s*0.1 - i*s*0.155;
    const wave = Math.sin(time*0.0062 - i*0.65)*s*0.14 + wag*3;
    const sz = s*(0.36 - i*0.027);
    const hue = (time*0.11 + i*42) % 360;
    const g = ctx.createRadialGradient(x, wave, 0, x, wave, sz*1.15);
    g.addColorStop(0,`hsl(${hue},88%,88%)`);
    g.addColorStop(0.5,`hsl(${hue},85%,62%)`);
    g.addColorStop(1,`hsl(${hue},80%,38%)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, wave, sz, sz*0.82, 0, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = `hsla(${hue},70%,98%,0.45)`;
    ctx.beginPath(); ctx.arc(x - sz*0.15, wave - sz*0.32, sz*0.18,0,Math.PI*2); ctx.fill();
  }

  const hg = ctx.createRadialGradient(s*0.18, -s*0.06, 0, s*0.18, 0, s*0.52);
  hg.addColorStop(0,'#fce7f3'); hg.addColorStop(0.55,t.body); hg.addColorStop(1,t.accent);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(s*0.18,0,s*0.46,s*0.36,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#fef08c';
  for (let i = 0; i < 6; i++) {
    const ax = -s*0.12 + i*s*0.09;
    const ay = -s*0.3 - Math.sin(i*1.4 + time*0.012)*s*0.09;
    ctx.beginPath(); ctx.moveTo(ax, -s*0.2); ctx.quadraticCurveTo(ax+s*0.06, ay-s*0.22, ax+s*0.11, -s*0.18); ctx.fill();
  }

  ctx.fillStyle = '#e0f2fe';
  ctx.beginPath(); ctx.moveTo(s*0.12, -s*0.35); ctx.lineTo(s*0.02, -s*0.72); ctx.lineTo(s*0.18, -s*0.34); ctx.fill();

  ctx.strokeStyle = '#67e8f9'; ctx.lineWidth = s*0.018;
  ctx.beginPath(); ctx.moveTo(s*0.09, -s*0.48); ctx.lineTo(s*0.13, -s*0.44); ctx.stroke();

  ctx.strokeStyle = '#fef08c'; ctx.lineWidth = s*0.028;
  ctx.beginPath();
  ctx.moveTo(s*0.42, s*0.1); ctx.quadraticCurveTo(s*0.72, s*0.18, s*0.62, s*0.42);
  ctx.moveTo(s*0.42, -s*0.1); ctx.quadraticCurveTo(s*0.72, -s*0.18, s*0.62, -s*0.42);
  ctx.stroke();

  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(s*0.29, -s*0.09, s*0.085,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#22d3ee'; ctx.beginPath(); ctx.arc(s*0.305, -s*0.085, s*0.052,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(s*0.315, -s*0.08, s*0.025,0,Math.PI*2); ctx.fill();
}

// Cannon
const cannon = { x:0, y:0, angle:-Math.PI/2, recoil:0 };
function updateCannonPos() { cannon.x = W/2; cannon.y = H-100; }
updateCannonPos();
window.addEventListener('resize', updateCannonPos);

function drawCannon() {
  ctx.save(); ctx.translate(cannon.x, cannon.y);
  const baseGrad = ctx.createRadialGradient(0,0,5,0,0,55);
  baseGrad.addColorStop(0,'#64748b'); baseGrad.addColorStop(1,'#1e2937');
  ctx.fillStyle = baseGrad;
  ctx.beginPath(); ctx.ellipse(0,9,58,20,0,0,Math.PI*2); ctx.fill();

  ctx.save();
  ctx.rotate(cannon.angle + Math.PI/2);
  ctx.translate(0, cannon.recoil);

  const bcolor = ['#facc15','#fb923c','#ef4444','#c084fc','#22d3ee'][state.betIdx];
  const len = 38 + state.betIdx*4.5;
  const wid = 15 + state.betIdx*2.2;

  const barrelGrad = ctx.createLinearGradient(-wid,0,wid,0);
  barrelGrad.addColorStop(0,adjust(bcolor,-55));
  barrelGrad.addColorStop(0.4,'#fff');
  barrelGrad.addColorStop(0.6,bcolor);
  barrelGrad.addColorStop(1,adjust(bcolor,-55));
  ctx.fillStyle = barrelGrad;
  ctx.beginPath(); ctx.roundRect(-wid, -len, wid*2, len+6, 6); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5; ctx.stroke();

  ctx.fillStyle = '#0f172a';
  ctx.beginPath(); ctx.ellipse(0, -len, wid*0.75, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  const hubGrad = ctx.createRadialGradient(-4,-4,0,0,0,19);
  hubGrad.addColorStop(0,'#f8fafc'); hubGrad.addColorStop(0.5,bcolor); hubGrad.addColorStop(1,adjust(bcolor,-60));
  ctx.fillStyle = hubGrad;
  ctx.beginPath(); ctx.arc(0,0,19,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#0f172a';
  ctx.font = 'bold 13px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(BET_LEVELS[state.betIdx], 0, 1);

  ctx.restore();
}

let spawnTimer = 0;
function spawnFish() {
  let total = 0;
  for (const w of SPAWN_WEIGHTS) total += w;
  let r = Math.random() * total;
  let idx = 0;
  for (let i = 0; i < SPAWN_WEIGHTS.length; i++) {
    r -= SPAWN_WEIGHTS[i];
    if (r <= 0) { idx = i; break; }
  }
  const type = FISH[idx];
  const fromLeft = Math.random() < 0.5;
  const margin = type.size + 20;
  const y = 80 + Math.random() * (H - 220);
  const sp = type.speed * (0.6 + Math.random() * 0.5);

  fish.push({
    type, x: fromLeft ? -margin : W + margin, y,
    vx: (fromLeft ? 1 : -1) * sp,
    vy: (Math.random() - 0.5) * 0.2,
    facing: fromLeft ? 1 : -1,
    angle: 0,
    size: type.size,
    hp: type.hp,
    maxHp: type.hp,
    flash: 0,
    drift: Math.random() * Math.PI * 2,
  });
}

function shoot(tx, ty) {
  if (!state.running) return;
  const cost = BET_LEVELS[state.betIdx];
  if (state.coins < cost) {
    const el = document.getElementById('coins');
    el.style.color = '#ff3b30';
    setTimeout(() => el.style.color = '#FFD700', 300);
    return;
  }
  if (ty > H - 60) return;

  state.coins -= cost;
  document.getElementById('coins').textContent = Math.floor(state.coins).toLocaleString();

  const dx = tx - cannon.x;
  const dy = ty - cannon.y;
  cannon.angle = Math.atan2(dy, dx);
  cannon.recoil = 6;

  const speed = 14 + state.betIdx * 0.8;
  bullets.push({
    x: cannon.x + Math.cos(cannon.angle) * 35,
    y: cannon.y + Math.sin(cannon.angle) * 35,
    vx: Math.cos(cannon.angle) * speed,
    vy: Math.sin(cannon.angle) * speed,
    damage: cost,
    level: state.betIdx,
    life: 120,
    trail: [],
  });
  haptic('shoot');
}

function castLightning() {
  if (state.lightning <= 0) return;
  state.lightning--;
  updateLightning();
  state.shake = 14;
  haptic('big');

  let totalEarn = 0;
  for (const f of fish) {
    if (f.x < -50 || f.x > W + 50) continue;
    const dmg = Math.max(40, f.maxHp * 0.6);
    f.hp -= dmg;
    f.flash = 1;
    if (f.hp <= 0) {
      const earn = computePayout(f);
      totalEarn += earn;
      killFish(f, earn, true);
    }
  }
  showToast(totalEarn > 0 ? `+${totalEarn.toLocaleString()}` : 'ZAP');
}

function computePayout(f) {
  let pay = f.type.val;
  if (Math.random() < 0.04) pay = Math.floor(pay * (2 + Math.random() * 3));
  if (f.type.boss && Math.random() < 0.1) pay = Math.floor(pay * 2);
  return Math.floor(pay * state.multiplier);
}

function killFish(f, earn, silent = false) {
  state.coins += earn;
  state.score += earn;
  if (state.score > state.best) {
    state.best = state.score;
    localStorage.setItem('oceanKirinBest', String(state.best));
  }
  document.getElementById('coins').textContent = Math.floor(state.coins).toLocaleString();

  state.combo++;
  state.comboTimer = 90;
  if (state.combo >= 5) {
    state.multiplier = Math.min(3, 1 + Math.floor(state.combo / 5) * 0.5);
    state.multTimer = 180;
  }

  popups.push({
    x: f.x, y: f.y, text: '+' + earn.toLocaleString(),
    life: 70, big: f.type.boss || earn >= 100,
  });

  const burstCount = Math.min(50, Math.floor(f.size));
  for (let i = 0; i < burstCount; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 5;
    particles.push({
      x: f.x, y: f.y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      color: i % 3 === 0 ? '#FFD700' : f.type.body,
      size: 2 + Math.random() * 4,
      glow: false,
    });
  }

  if (f.type.boss || (Math.random() < 0.005 && f.type.tier >= 3)) {
    state.lightning++;
    updateLightning();
    showToast('⚡ LIGHTNING');
  }

  const idx = fish.indexOf(f);
  if (idx >= 0) fish.splice(idx, 1);
}

function updateLightning() {
  const btn = document.getElementById('lightning');
  const count = document.getElementById('lightningCount');
  count.textContent = state.lightning;
  btn.disabled = state.lightning <= 0;
}

function showToast(text) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-title">${text}</div>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 800);
}

let lastTime = 0;
function update(dt) {
  const time = performance.now();

  if (state.comboTimer > 0) state.comboTimer--;
  else if (state.combo > 0) state.combo = 0;
  if (state.multTimer > 0) {
    state.multTimer--;
    if (state.multTimer === 0) state.multiplier = 1;
  }

  state.shake *= 0.85;
  if (state.shake < 0.1) state.shake = 0;
  cannon.recoil *= 0.7;

  spawnTimer -= dt;
  if (spawnTimer <= 0 || fish.length < 8) {
    spawnFish();
    spawnTimer = 400 + Math.random() * 800;
  }

  for (let i = fish.length - 1; i >= 0; i--) {
    const f = fish[i];
    f.x += f.vx;
    f.y += f.vy + Math.sin(time * 0.002 + f.drift) * 0.3;
    f.angle = Math.sin(time * 0.003 + f.drift) * 0.1 + (f.vy * 0.3);
    if (f.flash > 0) f.flash -= 0.05;

    const m = f.size + 60;
    if (f.x < -m && f.vx < 0) fish.splice(i, 1);
    else if (f.x > W + m && f.vx > 0) fish.splice(i, 1);
  }

  // Ricochet bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    if (b.x < 30 || b.x > W - 30) { b.vx *= -0.85; b.x = Math.max(30, Math.min(W - 30, b.x)); }
    if (b.y < 30 || b.y > H - 100) { b.vy *= -0.85; b.y = Math.max(30, Math.min(H - 100, b.y)); }

    if (b.life <= 0) {
      bullets.splice(i, 1);
      continue;
    }

    for (const f of fish) {
      const dx = b.x - f.x, dy = b.y - f.y;
      if (dx * dx + dy * dy < f.size * f.size * 0.25) {
        f.hp -= b.damage;
        f.flash = 1;
        if (f.hp <= 0) {
          const earn = computePayout(f);
          killFish(f, earn);
        }
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // particles, coinEffects, popups, bubbles (standard)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = coinEffects.length - 1; i >= 0; i--) {
    const c = coinEffects[i];
    c.x += c.vx; c.y += c.vy;
    c.vy += 0.25;
    c.rotation += c.vr;
    c.life--;
    if (c.life <= 0 || c.y > H + 50) coinEffects.splice(i, 1);
  }

  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 1.5;
    p.life--;
    if (p.life <= 0) popups.splice(i, 1);
  }

  for (const b of bubbles) {
    b.y += b.vy;
    b.x += b.vx;
    if (b.y < -10) {
      b.y = H + 10;
      b.x = Math.random() * W;
    }
  }
}

function drawBackground(time) {
  if (bgImage.complete) {
    ctx.drawImage(bgImage, 0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0f4c7a');
    g.addColorStop(1, '#000a1f');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#bae6fd';
  for (let i = 0; i < 5; i++) {
    const x = (W / 5) * (i + 1) + Math.sin(time * 0.00028 + i) * 45;
    ctx.beginPath();
    ctx.moveTo(x - 75, 0);
    ctx.lineTo(x + 75, 0);
    ctx.lineTo(x + 130, H);
    ctx.lineTo(x - 130, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  for (const b of bubbles) {
    ctx.fillStyle = `rgba(186,230,253,${b.alpha})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${b.alpha*0.6})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function render() {
  ctx.save();
  if (state.shake > 0) {
    ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
  }

  drawBackground(performance.now());

  fish.sort((a, b) => a.type.tier - b.type.tier);
  for (const f of fish) drawFish(f, performance.now());

  for (const b of bullets) drawBullet(b);
  for (const p of particles) drawParticle(p);
  for (const c of coinEffects) drawCoin(c);

  drawCannon();

  for (const p of popups) drawPopup(p);

  ctx.restore();
}

function getEventPos(e) {
  if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const p = getEventPos(e);
  shoot(p.x, p.y);
}, { passive: false });
canvas.addEventListener('mousedown', (e) => shoot(e.clientX, e.clientY));

document.getElementById('betUp').addEventListener('click', (e) => {
  e.stopPropagation();
  state.betIdx = (state.betIdx + 1) % BET_LEVELS.length;
  document.getElementById('betValue').textContent = BET_NAMES[state.betIdx];
});
document.getElementById('betDown').addEventListener('click', (e) => {
  e.stopPropagation();
  state.betIdx = (state.betIdx - 1 + BET_LEVELS.length) % BET_LEVELS.length;
  document.getElementById('betValue').textContent = BET_NAMES[state.betIdx];
});
document.getElementById('lightning').addEventListener('click', (e) => {
  e.stopPropagation();
  castLightning();
});

document.getElementById('playBtn').addEventListener('click', () => {
  document.getElementById('start').style.display = 'none';
  state.running = true;
  for (let i = 0; i < 5; i++) spawnFish();
});

function loop(now) {
  const dt = Math.min(50, now - lastTime);
  lastTime = now;
  if (state.running) update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
